<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Interactivo | Diseño Gráfico</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav class="nav">
        <div class="nav-container">
            <a href="#" class="nav-logo">CREATIVE STUDIO</a>
            <div class="nav-menu">
                <a href="#work" class="hover-link">Work</a>
                <a href="#contact" class="hover-link">Contact</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <span class="subtitle reveal">Portfolio 2026</span>
            <h1 class="main-title reveal">Diseño que <em>conecta</em> <br> con la audiencia.</h1>
        </div>
    </header>

    <section id="work" class="work">
        <div class="work-grid">
            <div class="work-item v-stretch reveal">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=2000" alt="Design 1" class="parallax-img">
                </div>
                <div class="work-details">
                    <p>01 — Branding</p>
                    <h3>Visual Identity</h3>
                </div>
            </div>

            <div class="work-item small reveal">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=2000" alt="Design 2" class="parallax-img">
                </div>
                <div class="work-details">
                    <p>02 — Digital</p>
                    <h3>Interface Design</h3>
                </div>
            </div>
            
            <div class="work-item h-stretch reveal">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1634942537034-2531766767d1?q=80&w=2000" alt="Design 3" class="parallax-img">
                </div>
                <div class="work-details">
                    <p>03 — Art Direction</p>
                    <h3>Modern Aesthetic</h3>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer reveal">
        <h2>¿Listo para empezar?</h2>
        <a href="mailto:tuemail@dominio.com" class="email-link">hola@tusitio.com</a>
    </footer>
